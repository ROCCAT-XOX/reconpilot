name: Build and Deploy ReconForge
on:
  push:
    branches: [ main ]
env:
  REGISTRY: registry.arcadia-capitals.com
  IMAGE_NAME: reconpilot

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check backend/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reconforge_test
          POSTGRES_USER: reconforge
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://reconforge:testpassword@localhost:5432/reconforge_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: testing
        run: |
          cd backend
          pytest --tb=short -q

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=release
            type=sha,prefix=commit-
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    steps:
      - name: Deploy to k3s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            kubectl -n flow set image deployment/reconpilot \
              backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            kubectl -n flow rollout status deployment/reconpilot --timeout=120s

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment stabilization
        run: sleep 15

      - name: Health check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 --retry 3 --retry-delay 5 \
            "http://${{ secrets.DEPLOY_HOST }}:30811/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Version check
        run: |
          VERSION=$(curl -s --max-time 10 \
            "http://${{ secrets.DEPLOY_HOST }}:30811/api/v1/status" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "✅ Deployed version: $VERSION"

      - name: API login test
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -X POST "http://${{ secrets.DEPLOY_HOST }}:30811/api/v1/auth/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=smoke@test.invalid&password=invalid")
          # 401 = auth working correctly, anything else is a problem
          if [ "$HTTP_CODE" != "401" ] && [ "$HTTP_CODE" != "422" ]; then
            echo "❌ Login endpoint returned unexpected HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Auth endpoint responding (HTTP $HTTP_CODE)"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "⚠️ Smoke tests failed, rolling back..."
            kubectl -n flow rollout undo deployment/reconpilot
            kubectl -n flow rollout status deployment/reconpilot --timeout=120s
