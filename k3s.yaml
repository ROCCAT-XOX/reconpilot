---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: reconforge
---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: reconforge-secret
  namespace: reconforge
type: Opaque
stringData:
  SECRET_KEY: "changeme-generate-with-openssl-rand-hex-32"
  DB_PASSWORD: "changeme-strong-db-password"
  REDIS_PASSWORD: "changeme-redis-password"
---
# Single Pod: App + PostgreSQL + Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconforge
  namespace: reconforge
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1m"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reconforge
  template:
    metadata:
      labels:
        app: reconforge
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-node-1-promedia
      containers:
        # === ReconForge App (Frontend + Backend + Nginx) ===
        - name: app
          image: registry.arcadia-capitals.com/reconpilot:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: ENVIRONMENT
              value: "production"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: REDIS_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://reconforge:$(DB_PASSWORD)@localhost:5432/reconforge"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@localhost:6379/0"
          volumeMounts:
            - name: scan-data
              mountPath: /app/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5

        # === PostgreSQL (gleicher Pod → localhost:5432) ===
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "reconforge"
            - name: POSTGRES_USER
              value: "reconforge"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: DB_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "reconforge"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "reconforge"]
            initialDelaySeconds: 5
            periodSeconds: 5

        # === Redis (gleicher Pod → localhost:6379) ===
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: scan-data
          emptyDir: {}
        - name: postgres-data
          emptyDir: {}
---
# ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: reconforge
  namespace: reconforge
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: reconforge
---
# NodePort Service für externen Zugriff
apiVersion: v1
kind: Service
metadata:
  name: reconforge-nodeport
  namespace: reconforge
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30801
      name: http
  selector:
    app: reconforge
