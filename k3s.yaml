---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: reconforge-secret
  namespace: flow
type: Opaque
stringData:
  SECRET_KEY: "491197621b3c5896458af18819913b0154bb87ed6c853ad398f23e0ebd8fa2dc"
  DB_PASSWORD: "reconforge-test-db-2026"
  REDIS_PASSWORD: "reconforge-test-redis-2026"
---
# Single Pod: App + PostgreSQL + Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconforge
  namespace: flow
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1m"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: reconforge
  template:
    metadata:
      labels:
        app: reconforge
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-node-1-promedia
      containers:
        - name: app
          image: registry.arcadia-capitals.com/reconpilot:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: ENVIRONMENT
              value: "production"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: REDIS_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://reconforge:$(DB_PASSWORD)@localhost:5432/reconforge"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@localhost:6379/0"
          volumeMounts:
            - name: scan-data
              mountPath: /app/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30

        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "reconforge"
            - name: POSTGRES_USER
              value: "reconforge"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: DB_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "reconforge"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "reconforge"]
            initialDelaySeconds: 5
            periodSeconds: 5

        - name: redis
          image: redis:7-alpine
          args:
            - "redis-server"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "128mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - ""
            - "--appendonly"
            - "no"
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reconforge-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: scan-data
          emptyDir: {}
        - name: postgres-data
          emptyDir: {}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: reconforge
  namespace: flow
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: reconforge
---
# NodePort Service
apiVersion: v1
kind: Service
metadata:
  name: reconforge-nodeport
  namespace: flow
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30811
      name: http
  selector:
    app: reconforge
